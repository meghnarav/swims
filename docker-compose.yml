version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: swims-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: swims
      MYSQL_USER: swims_user
      MYSQL_PASSWORD: swims_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initialize schema and seed data on first run
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  db_data:

